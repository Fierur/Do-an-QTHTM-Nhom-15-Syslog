# =============================================================================
# FILE    : client/rsyslog-client.conf
# MỤC ĐÍCH: Cấu hình Rsyslog Client — gửi log về Syslog Server tập trung
# CÀI ĐẶT : Copy vào /etc/rsyslog.d/99-remote.conf trên mỗi client
# SERVER  : 192.168.10.100 (Syslog Server — Nhóm 15)
# =============================================================================

# =============================================================================
# GIẢI THÍCH: UDP vs TCP trong Rsyslog
# =============================================================================
# UDP (@):
#   - Giao thức không kết nối (connectionless), không đảm bảo giao hàng
#   - Rất nhanh vì không cần bắt tay (handshake)
#   - Gói tin có thể bị mất nếu mạng tắc nghẽn
#   - Phù hợp: log thông thường, không quan trọng (syslog thông thường)
#
# TCP (@@):
#   - Giao thức có kết nối, đảm bảo giao hàng (delivery guarantee)
#   - Chậm hơn UDP một chút nhưng không mất log
#   - Nếu server ngắt kết nối → TCP sẽ buffer log chờ kết nối lại
#   - Phù hợp: log auth, error, log quan trọng không được mất
#
# DISK QUEUE:
#   - Khi server ngắt kết nối, log sẽ được lưu tạm ra đĩa thay vì mất
#   - Khi server khôi phục, log trong queue sẽ được gửi lại tự động
#   - Thiếu disk queue: nếu server down 1 phút → mất toàn bộ log trong 1 phút đó
# =============================================================================


###############################################################################
# PHẦN 1: ĐƯỜNG DẪN LÀM VIỆC CHO QUEUE
# rsyslog cần thư mục này để lưu queue xuống đĩa khi server ngắt kết nối
###############################################################################
$WorkDirectory /var/spool/rsyslog


###############################################################################
# PHẦN 2: GỬI LOG AUTH VÀ CRITICAL QUA TCP (ĐỘ TIN CẬY CAO)
# Dùng TCP (@@) cho log auth và critical vì:
#   - Không được phép mất log đăng nhập, sudo, lỗi nghiêm trọng
#   - TCP đảm bảo server nhận được hoặc sẽ retry
###############################################################################

# Template để thêm hostname vào message (giúp server phân loại đúng)
$template RemoteFormat,"%TIMESTAMP% %HOSTNAME% %syslogtag%%msg:::sp-if-no-1st-sp%%msg:::drop-last-lf%\n"

# Gửi auth.* (tất cả mức của facility auth) qua TCP
# Bao gồm: login, logout, sudo, su, SSH, PAM authentication
auth.*  action(type="omfwd"
              target="192.168.10.100"
              port="514"
              protocol="tcp"
              # Disk Queue — lưu log ra đĩa nếu server down
              queue.type="LinkedList"
              queue.filename="fwdRule_auth"        
                # Tên file queue trên đĩa
              queue.maxdiskspace="100m"            
                # Tối đa 100MB queue trên đĩa
              queue.saveonshutdown="on"            
                # Lưu queue khi rsyslog tắt
              queue.size="0"                  
                # Số message tối đa trong queue
              # Retry mãi mãi khi mất kết nối (-1 = không giới hạn số lần retry)
              action.resumeRetryCount="-1"
              action.resumeInterval="10"           
                # Thử lại mỗi 10 giây
              template="RemoteFormat")

# Gửi *.crit — tất cả facility mức Critical qua TCP
# Bao gồm: disk full, kernel panic, service crash
*.crit  action(type="omfwd"
              target="192.168.10.100"
              port="514"
              protocol="tcp"
              queue.type="LinkedList"
              queue.filename="fwdRule_crit"
              queue.maxdiskspace="50m"
              queue.saveonshutdown="on"
              queue.size="0"
              action.resumeRetryCount="-1"
              action.resumeInterval="10"
              template="RemoteFormat")


###############################################################################
# PHẦN 3: GỬI TẤT CẢ LOG QUA UDP (TỐC ĐỘ CAO)
# Dùng UDP (@) cho tất cả log vì:
#   - Cho phép server nhận tổng quan toàn bộ hoạt động client
#   - UDP nhanh, phù hợp volume log lớn
#   - Mất một vài message không nghiêm trọng với log thông thường
###############################################################################

# *.* = tất cả facility, tất cả severity
# @ = gửi qua UDP (một dấu @)
*.*     action(type="omfwd"
              target="192.168.10.100"
              port="514"
              protocol="udp"
              template="RemoteFormat")


###############################################################################
# PHẦN 4: GIỮ BẢN SAO LOG CỤC BỘ
# QUAN TRỌNG: KHÔNG dùng "& stop" sau các action gửi từ xa
# Nếu dùng "& stop" → log sẽ KHÔNG được ghi vào file local nữa
# Mục đích: client vẫn có log local để debug khi mất kết nối đến server
#
# Cơ chế: Rsyslog xử lý TỪNG rule theo thứ tự. Nếu không có "stop",
# log sẽ tiếp tục được xử lý bởi các rule trong /etc/rsyslog.conf mặc định
# (auth,authpriv.* → /var/log/auth.log; *.*;auth.none → /var/log/syslog)
###############################################################################

# KHÔNG CÓ "& stop" hoặc "& ~" ở đây — rsyslog tự động tiếp tục
# xử lý log theo các rule mặc định trong /etc/rsyslog.conf
# → Log vẫn được ghi vào /var/log/syslog và /var/log/auth.log cục bộ
