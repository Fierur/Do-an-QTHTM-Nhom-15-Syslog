# =============================================================================
# FILE    : server/alert_rules.conf
# MỤC ĐÍCH: Cấu hình cảnh báo bảo mật — phát hiện brute-force và lỗi nghiêm trọng
# CÀI ĐẶT : Copy vào /etc/rsyslog.d/99-alerts.conf trên Syslog Server
# LƯU Ý  : File này được nạp SAU rsyslog.conf (nhờ prefix 99-)
# =============================================================================


###############################################################################
# PHẦN 1: TEMPLATE ĐỊNH DẠNG FILE ALERT
# Ghi đầy đủ thông tin: thời gian, IP nguồn, hostname, nội dung
###############################################################################

# Template ghi alert với đầy đủ thông tin để forensic sau này
template(name="AlertFormat"
         type="string"
         string="%TIMESTAMP:::date-rfc3339% [%fromhost-ip%] %HOSTNAME% %syslogtag%%msg:::sp-if-no-1st-sp%%msg:::drop-last-lf%\n")


###############################################################################
# PHẦN 2: RULE PHÁT HIỆN BRUTE-FORCE SSH
# Điều kiện: message chứa chuỗi "Failed password"
# Đây là dấu hiệu đặc trưng khi ai đó cố đăng nhập SSH sai mật khẩu nhiều lần
###############################################################################

# Rule bắt "Failed password" từ bất kỳ host nào trong mạng nội bộ
# Thường xuất hiện trong sshd log với nội dung:
#   "Failed password for root from 192.168.x.x port 22 ssh2"
if ($fromhost-ip startswith "192.168.10.") and \
   ($msg contains "Failed password") then {

    # Ghi vào file brute_force.log để theo dõi tấn công
    action(type="omfile"
           file="/var/log/alerts/brute_force.log"
           template="AlertFormat"
           # Flush ngay để không bỏ sót alert
           flushOnTXEnd="on")

    # Không dùng "stop" — cho phép log tiếp tục được xử lý bởi các rule khác
    # (vẫn được ghi vào auth.log và syslog.log)
}


###############################################################################
# PHẦN 3: RULE PHÁT HIỆN LOG NGHIÊM TRỌNG (Emergency / Alert / Critical)
# Severity 0 = Emergency  — hệ thống không thể dùng được
# Severity 1 = Alert      — cần xử lý ngay lập tức
# Severity 2 = Critical   — lỗi nghiêm trọng của hardware hoặc dịch vụ cốt lõi
###############################################################################

# Rule bắt tất cả log có severity từ 0 đến 2
# Dùng $syslogseverity <= 2 thay vì liệt kê từng mức
if ($fromhost-ip startswith "192.168.10.") and \
   ($syslogseverity <= 2) then {

    # Ghi vào file critical.log — đây là file cần monitor 24/7 trong thực tế
    action(type="omfile"
           file="/var/log/alerts/critical.log"
           template="AlertFormat"
           flushOnTXEnd="on")

    # Log vẫn tiếp tục được xử lý bởi rule khác (ghi vào syslog.log, error.log)
}


###############################################################################
# PHẦN 4: RULE PHÁT HIỆN OOM KILLER (Out-Of-Memory)
# Khi kernel kill process vì hết RAM — dấu hiệu server sắp hỏng
###############################################################################

if ($fromhost-ip startswith "192.168.10.") and \
   ($msg contains "Out of memory" or $msg contains "oom-killer") then {

    action(type="omfile"
           file="/var/log/alerts/critical.log"
           template="AlertFormat"
           flushOnTXEnd="on")
}


###############################################################################
# PHẦN 5: RULE PHÁT HIỆN DISK ĐẦY
# Message điển hình: "No space left on device"
###############################################################################

if ($fromhost-ip startswith "192.168.10.") and \
   ($msg contains "No space left on device" or $msg contains "Disk full") then {

    action(type="omfile"
           file="/var/log/alerts/critical.log"
           template="AlertFormat"
           flushOnTXEnd="on")
}
