# =============================================================================
# FILE    : server/rsyslog.conf
# MỤC ĐÍCH: Cấu hình Rsyslog Server nhận log tập trung từ 3 client
# PHIÊN BẢN: Rsyslog v8.x
# ĐỌC THÊM: https://www.rsyslog.com/doc/
# =============================================================================

###############################################################################
# PHẦN 1: CÀI ĐẶT TOÀN CỤC (Global Directives)
###############################################################################

# Số luồng worker xử lý log song song — tăng throughput khi có nhiều client
$MaxMessageSize 64k

# Đặt thư mục làm việc cho queue disk (nếu dùng)
$WorkDirectory /var/spool/rsyslog

# Cho phép rsyslog tạo thư mục cha nếu chưa tồn tại
$CreateDirs on

# Quyền mặc định khi tạo file log mới
$FileOwner syslog
$FileGroup adm
$FileCreateMode 0640
$DirCreateMode 0750
$Umask 0022


###############################################################################
# PHẦN 2: NẠP MODULE CẦN THIẾT
###############################################################################

# Module hỗ trợ hệ thống log nội bộ (bắt buộc)
module(load="imuxsock")
module(load="imklog")   # Đọc kernel log

# Module nhận log qua UDP (nhanh, không đảm bảo giao hàng)
# Dùng cho log thông thường, ít quan trọng
module(load="imudp")
input(type="imudp" port="514")

# Module nhận log qua TCP (đáng tin cậy, đảm bảo giao hàng)
# Dùng cho log quan trọng như auth, error
module(load="imtcp")
input(type="imtcp" port="514")


###############################################################################
# PHẦN 3: HIỆU NĂNG — QUEUE CHỦ (Main Message Queue)
# Cho phép server xử lý log khi bị spike đột ngột từ nhiều client
###############################################################################

# Số lượng message tối đa trong hàng chờ chính
# 100000 message đủ để buffer khi server bận
$MainMsgQueueSize 100000

# Số luồng worker xử lý queue — 4 luồng cho lab 3 client là đủ
$MainMsgQueueWorkerThreads 4

# Loại queue: LinkedList cho phép tăng/giảm linh hoạt
$MainMsgQueueType LinkedList

# Timeout đóng queue khi shutdown (ms)
$MainMsgQueueTimeoutEnqueue 100


###############################################################################
# PHẦN 4: LỌC NGUỒN — CHỈ NHẬN LOG TỪ MẠNG NỘI BỘ 192.168.10.0/24
# Bảo mật: từ chối log từ IP ngoài dải cho phép
###############################################################################

# Khai báo bộ lọc IP — chỉ chấp nhận từ dải 192.168.10.x
# Lưu ý: $AllowedSender chỉ hoạt động với imudp/imtcp cũ (legacy syntax)
$AllowedSender UDP, 192.168.10.0/24
$AllowedSender TCP, 192.168.10.0/24


###############################################################################
# PHẦN 5: TEMPLATE ĐỊNH DẠNG TÊN FILE LOG
# Log được phân chia theo hostname của client gửi đến
###############################################################################

# Template đường dẫn file log tổng hợp theo hostname
# Ví dụ: /var/log/remote/web-client/syslog.log
template(name="RemoteSyslogFile"
         type="string"
         string="/var/log/remote/%HOSTNAME%/syslog.log")

# Template đường dẫn file auth log theo hostname
# Chỉ lưu log từ facility "auth" (đăng nhập, sudo, SSH...)
template(name="RemoteAuthFile"
         type="string"
         string="/var/log/remote/%HOSTNAME%/auth.log")

# Template đường dẫn file error log theo hostname
# Chỉ lưu log từ severity Error (3) trở lên nghiêm trọng hơn
template(name="RemoteErrorFile"
         type="string"
         string="/var/log/remote/%HOSTNAME%/error.log")

# Template định dạng nội dung từng dòng log (bao gồm thời gian, hostname, tag)
template(name="RemoteLogFormat"
         type="string"
         string="%TIMESTAMP:::date-rfc3339% %HOSTNAME% %syslogtag%%msg:::sp-if-no-1st-sp%%msg:::drop-last-lf%\n")


###############################################################################
# PHẦN 6: QUY TẮC GHI LOG — PHÂN LOẠI VÀO FILE TƯƠNG ỨNG
###############################################################################

# --- 6.1: Lưu TOÀN BỘ log từ xa vào syslog.log theo hostname ---
# Tất cả facility, tất cả severity đều được ghi vào đây
if $fromhost-ip startswith "192.168.10." then {
    action(type="omfile"
           dynaFile="RemoteSyslogFile"
           template="RemoteLogFormat"
           # DynaFile cache: giữ 100 file descriptor mở để tăng tốc ghi
           dynaFileCacheSize="100"
           asyncWriting="on"
           flushOnTXEnd="off"
           ioBufferSize="64k")
}

# --- 6.2: Lưu log AUTH vào auth.log theo hostname ---
# Facility auth (4) và authpriv (10) — liên quan đến xác thực, SSH, sudo
if ($fromhost-ip startswith "192.168.10.") and \
   ($syslogfacility-text == "auth" or $syslogfacility-text == "authpriv") then {
    action(type="omfile"
           dynaFile="RemoteAuthFile"
           template="RemoteLogFormat"
           dynaFileCacheSize="100"
           asyncWriting="on")
}

# --- 6.3: Lưu log ERROR (severity <= 3) vào error.log theo hostname ---
# Severity: 0=emerg, 1=alert, 2=crit, 3=err — từ mức error trở lên nghiêm trọng
if ($fromhost-ip startswith "192.168.10.") and \
   ($syslogseverity <= 3) then {
    action(type="omfile"
           dynaFile="RemoteErrorFile"
           template="RemoteLogFormat"
           dynaFileCacheSize="100"
           asyncWriting="on")
}


###############################################################################
# PHẦN 7: NẠP CẤU HÌNH BỔ SUNG TỪ THƯ MỤC rsyslog.d/
# Bao gồm alert_rules.conf được cài ở /etc/rsyslog.d/99-alerts.conf
###############################################################################
$IncludeConfig /etc/rsyslog.d/*.conf


###############################################################################
# PHẦN 8: LOG CỤC BỘ CỦA SERVER (giữ nguyên cấu hình mặc định Ubuntu)
###############################################################################

# Log kernel và hệ thống cục bộ của server
auth,authpriv.*         /var/log/auth.log
*.*;auth,authpriv.none  -/var/log/syslog
kern.*                  -/var/log/kern.log
*.emerg                 :omusrmsg:*
